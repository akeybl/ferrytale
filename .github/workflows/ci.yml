name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install base runtime
        run: pip install -r requirements.txt
      - name: Compile all Python sources
        run: |
          python -m py_compile ferrytale.py elevenlabs_voices.py voice.py \
            build_transcripts.py scripts/*.py diagnostics/*.py
      - name: Engine smoke (no API key needed)
        run: |
          python ferrytale.py --show-config
          python ferrytale.py --list-games > /dev/null
          python ferrytale.py --list
